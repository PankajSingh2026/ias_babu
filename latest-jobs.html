<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latest Jobs | IASBABU</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="navbar" id="site-header"></header>
<main class="page">
  <section class="list-page">
    <h1>Latest Jobs</h1>
    <ul class="full-list" id="list"></ul>
  </section>
</main>
<footer class="site-footer" id="site-footer"></footer>
<script src="js/store.js"></script>
<script src="js/layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const db = loadDB();
  const items = db.notifications.filter(n => n.category === 'job');
  const el = document.getElementById('list');
  el.innerHTML = items.length ? items.map(n => `
    <li class="${n.highlighted ? 'highlight' : ''}"><a href="${n.url}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a></li>
  `).join('') : '<li class="empty">No entries yet.</li>';
});
</script>
</body>
</html>
