<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admit Card | IASBABU</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="navbar" id="site-header"></header>
<main class="page">
  <section class="list-page">
    <h1>Admit Card</h1>
    <ul class="full-list" id="list"></ul>
  </section>
</main>
<footer class="site-footer" id="site-footer"></footer>
<script src="js/store.js"></script>
<script src="js/layout.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/notifications-firestore.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const el = document.getElementById('list');
  subscribeNotifications('admit_card', items => {
    el.innerHTML = items.length ? items.map(n => `
      <li class="${n.highlighted ? 'highlight' : ''}"><a href="${n.url}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a></li>
    `).join('') : '<li class="empty">No entries yet.</li>';
  });
});
</script>
</body>
</html>
